<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEM: Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web" defer></script>

<style>
/* ─── Design Tokens (shared with sem-015) ─────────────── */
:root {
  /* Primitives — Brand (emerald) */
  --teal-50:  #f0f9f5;
  --teal-100: #e0f1eb;
  --teal-200: #cce7de;
  --teal-300: #99cfbd;
  --teal-400: #149167;
  --teal-450: #2bb27f;
  --teal-500: #00875a;
  --teal-600: #006946;
  --teal-700: #00553a;
  --teal-800: #003d28;
  --teal-900: #002b1c;
  --teal-950: #001a10;

  /* Primitives — Neutral (navy-cool, H=240) */
  --neutral-50:  oklch(0.985 0.008 240);
  --neutral-100: oklch(0.960 0.010 240);
  --neutral-200: oklch(0.910 0.012 240);
  --neutral-300: oklch(0.830 0.014 240);
  --neutral-400: oklch(0.700 0.014 240);
  --neutral-500: oklch(0.580 0.014 240);
  --neutral-600: oklch(0.460 0.014 240);
  --neutral-700: oklch(0.330 0.020 240);
  --neutral-800: oklch(0.220 0.025 240);
  --neutral-850: oklch(0.190 0.025 240);
  --neutral-900: oklch(0.160 0.025 240);
  --neutral-950: oklch(0.110 0.020 240);

  --red-500: oklch(0.580 0.220 25);
  --base-white: oklch(1 0 0);

  /* Semantic — Dark (default) */
  --bg-page:     var(--neutral-950);
  --bg-surface:  var(--neutral-900);
  --bg-elevated: var(--neutral-800);

  --text-primary:   var(--neutral-50);
  --text-secondary: var(--neutral-400);
  --text-tertiary:  var(--neutral-500);
  --text-brand:     var(--teal-300);

  --border-default: var(--neutral-700);
  --border-subtle:  var(--neutral-800);

  --brand-bg-default: var(--teal-400);
  --brand-bg-hover:   var(--teal-500);
  --brand-fg:         var(--base-white);

  /* White ring matches the field's focused border (solid white) for a
     cohesive "snow-edge" look on the emerald aura, instead of the
     brand-emerald halo we use elsewhere. */
  --focus-ring: 0 0 0 4px rgba(255, 255, 255, 0.18);

  --surface-hover:  rgba(255,255,255,.04);
  --surface-active: rgba(255,255,255,.06);

  --input-fg:          var(--text-primary);
  --input-placeholder: var(--text-secondary);
  --input-border-focus: var(--brand-bg-default);
  --input-border-error: var(--red-500);

  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px;
  --s5: 20px; --s6: 24px; --s8: 32px; --s10: 40px;
  --r-sm: 2px; --r-md: 4px; --r-lg: 6px; --r-xl: 8px; --r-2xl: 12px;
}

/* Light theme parity */
[data-theme="light"] {
  --bg-page:     var(--neutral-50);
  --bg-surface:  var(--neutral-100);
  --bg-elevated: var(--base-white);

  --text-primary:   var(--neutral-900);
  --text-secondary: var(--neutral-500);
  --text-tertiary:  var(--neutral-500);
  --text-brand:     var(--teal-500);

  --border-default: var(--neutral-300);
  --border-subtle:  var(--neutral-200);

  --brand-bg-default: var(--teal-400);
  --brand-bg-hover:   var(--teal-500);

  --surface-hover:  rgba(0,0,0,.03);
  --surface-active: rgba(0,0,0,.06);
}

/* ─── Reset ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  font-size: 14px;
  background: var(--neutral-900);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: var(--s4);
}
/* Animated emerald aura: pseudo-element pinned to viewport (position
   fixed) so it doesn't disturb body's flex centering. transform is
   GPU-accelerated and clip-path keeps the scaled gradient within
   viewport bounds without needing overflow:hidden on body. */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(90% 100% at 50% 0%,
                    var(--teal-500) 5%,
                    var(--neutral-900) 100%);
  pointer-events: none;
}
[data-theme="light"] body {
  background:
    radial-gradient(109.02% 100% at 50% 100%,
                    var(--teal-400) 10%,
                    var(--neutral-100) 100%);
}
.ph { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; line-height: 1; }

button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font: inherit; color: inherit; background: transparent; border: none; outline: none; width: 100%; }
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
  /* Keep the field looking transparent over the emerald aura by stalling
     Chrome's autofill background-color transition for an effectively
     infinite duration. The known 600000s hack is the only reliable way
     to bypass UA-paint without a solid inset overlay (which can't match
     a moving gradient). */
  -webkit-text-fill-color: #fff;
  transition: background-color 600000s ease-in-out 0s, color 600000s ease-in-out 0s;
  caret-color: #fff;
}
a { color: var(--text-brand); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 3px; }

:focus { outline: none; }

/* Skip link (a11y) */
.skip-link {
  position: absolute;
  left: 12px; top: -40px;
  z-index: 1000;
  padding: 8px 12px;
  background: var(--brand-bg-default);
  color: var(--brand-fg);
  border-radius: var(--r-md);
  font-size: 13px;
  font-weight: 600;
  transition: top 120ms ease-out;
}
.skip-link:focus-visible { top: 12px; outline: 2px solid var(--brand-fg); outline-offset: 2px; }

/* ─── Login card ──────────────────────────────────────── */
.login-card {
  /* position: relative (no z-index) keeps the card in the root stacking
     context so its descendants' mix-blend-mode can reach the body::before
     gradient as a backdrop. Source-order is still enough to paint the
     card above the pseudo (positioned children paint after pseudo). */
  position: relative;
  width: 100%;
  /* 404px ≈ 475px − 15%. Height-affecting tokens (padding, gap, type
     scale, field/button heights) are unchanged — only the card's
     horizontal footprint contracts. */
  max-width: 404px;
  border-radius: var(--r-2xl);
  padding: 48px 0 44px;
  display: flex;
  flex-direction: column;
  gap: 40px;
  border: none;
  background: transparent;
}

/* ─── Brand lockup (mark + wordmark) ──────────────────── */
.brand-lockup {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  padding-bottom: 0;
}
.brand-mark {
  position: relative;
  color: var(--brand-bg-default);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  line-height: 1;
  padding: 12px;
  border-radius: var(--r-xl);
  background: linear-gradient(to bottom, var(--teal-500), var(--teal-400));
  box-shadow: 0 20px 24px color-mix(in srgb, var(--teal-900) 15%, transparent);
}
/* White 100%→20% gradient border via masked pseudo, plus-lighter blend
   so the ring glows additively over the emerald aura. Same pattern as
   the field border previously had. */
.brand-mark::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(to bottom,
                              rgba(255, 255, 255, 0.20),
                              rgba(255, 255, 255, 0));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  mix-blend-mode: plus-lighter;
  pointer-events: none;
}
/* Glyph: top-to-bottom CTA-100%→20% gradient via background-clip:text,
   plus a small drop-shadow on the painted result so the icon lifts
   off its tinted plate. */
.brand-mark i {
  background: linear-gradient(to bottom,
                              var(--teal-50),
                              var(--teal-300));
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
          color: transparent;
  filter: drop-shadow(0 4px 2px color-mix(in srgb, var(--teal-800) 25%, transparent));
  mix-blend-mode: normal;
}
.wordmark {
  text-align: center;
  font-size: 28px;
  font-weight: 600;
  line-height: 1.15;
  color: var(--text-primary);
  letter-spacing: 0;
  white-space: nowrap;
}

/* ─── Field (shared pattern with sem-015) ─────────────── */
.field {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  padding: 8px var(--s4);
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid transparent;
  border-radius: var(--r-lg);
  color: var(--input-fg);
  min-width: 0;
  position: relative;
  transition: border-color .15s, background .15s;
  min-height: 64px;
  cursor: text;
}
.field:hover { background: rgba(255, 255, 255, 0.08); }
/* Gradient border via a masked pseudo-element so the overlay blend
   mode is scoped to JUST the border, leaving the field surface and
   inner content unaffected. Top: 50% white, bottom: 10% — gives a
   subtle "lit edge" feel against the emerald aura. The focus rule
   below sets a solid white border by overriding border-color on the
   field itself (which paints over the masked gradient). */
.field::before {
  content: "";
  position: absolute;
  /* abs-positioned pseudo's containing block is the padding-box, so
     inset:0 sits 1px inside .field's outer edge (because of the field's
     own transparent border). Pull it out by -1px so the 1px gradient
     ring lands precisely on the border line, matching the field's
     visible outer rectangle. */
  inset: -1px;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(to bottom,
                              color-mix(in srgb, var(--brand-bg-default) 65%, transparent),
                              color-mix(in srgb, var(--brand-bg-default) 20%, transparent));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  pointer-events: none;
}
.field:focus-within { border-color: var(--base-white); background: rgba(255, 255, 255, 0.10); }
.field:focus-within::before { opacity: 0; }
.field.is-invalid {
  border-color: #ff3d3d;
  background: rgba(255, 61, 61, 0.16);
}
/* Hide the brand-gradient pseudo border so the red error border isn't
   visually competing with an overlay of emerald. */
.field.is-invalid::before { opacity: 0; }
.field.is-invalid .field-label { color: #ff3d3d; opacity: 1; mix-blend-mode: normal; }
/* When the user re-focuses an invalid field, switch the whole shell
   back to focus styling so border/bg/label read consistently as
   "actively editing". The .is-invalid class will be cleared on
   the next input event; if they tab away still-invalid, blur
   re-applies the red treatment. */
.field.is-invalid:focus-within {
  border-color: var(--base-white);
  background: rgba(255, 255, 255, 0.10);
}
.field.is-invalid:focus-within .field-label { color: var(--base-white); }
.field.has-error { border-color: var(--input-border-error); }

.field-label {
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  opacity: 0.4;
  mix-blend-mode: plus-lighter;
  text-transform: uppercase;
  letter-spacing: 0.75px;
  line-height: 12px;
  pointer-events: none;
  user-select: none;
  transition: opacity .12s;
}
.field:focus-within .field-label {
  color: var(--base-white);
  opacity: 1;
  mix-blend-mode: normal;
}

.field-row {
  display: flex;
  align-items: center;
  gap: var(--s2);
  min-height: 20px;
  color: #fff;
}
/* Typed value is solid white — meaningful content reads at full
   opacity. Placeholder + leading icons get the same 50% overlay
   treatment as forgot/eye-toggle so the "empty field" affordances
   feel cohesive. */
.field-row > i:not(.field-affix) {
  color: #fff;
  opacity: 0.5;
  mix-blend-mode: overlay;
  flex-shrink: 0;
  font-size: 16px;
}
.field-row input { color: #fff; font-size: 16px; }

input::placeholder {
  color: rgba(255,255,255,0.15);
  mix-blend-mode: plus-lighter;
}

/* Password: wider tracking so dot/letter rhythm reads more deliberate */
#password { letter-spacing: 0.2em; }

/* Trailing affix (e.g. eye toggle for password) */
.field-affix {
  position: absolute;
  right: var(--s3);
  top: 50%;
  transform: translateY(-50%);
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  opacity: 0.5;
  mix-blend-mode: overlay;
  border-radius: var(--r-sm);
  font-size: 16px;
  cursor: pointer;
  background: transparent;
  transition: opacity .12s, background .12s;
}
.field-affix:hover { background: var(--surface-hover); opacity: 1; }
.field:has(.field-affix) .field-row { padding-right: 28px; }

/* Error helper text below the field */
.field-error {
  margin-top: 4px;
  font-size: 12px;
  font-weight: 500;
  color: var(--input-border-error);
  min-height: 16px;
}

/* ─── Form layout ─────────────────────────────────────── */
.login-form {
  display: flex;
  flex-direction: column;
  /* X = 8px gap between fields. Items needing 2X/3X visual distance
     add an explicit margin-top on top of the gap. */
  gap: var(--s2);
  align-items: stretch;
}
.form-actions {
  display: flex;
  flex-direction: column;
  /* gap (s2=8) + margin-top (s8=32) → 40px = 5X password→button. */
  margin-top: var(--s8);
}
.login-form .forgot {
  align-self: center;
  /* gap (s2=8) + margin-top (s6=24) → 32px = 4X button→forgot. */
  margin-top: var(--s6);
}

/* ─── Buttons (matches sem-015 .btn-primary) ──────────── */
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--s2);
  width: 100%;
  height: 56px;
  padding: 0 var(--s4);
  background: var(--base-white);
  color: var(--teal-950);
  font-size: 15px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-radius: var(--r-lg);
  transition: background .12s, color .12s;
}
.btn-primary:hover { background: color-mix(in srgb, var(--base-white) 90%, var(--teal-500)); }
.btn-spinner {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  animation: btn-spin 0.6s linear infinite;
}
@keyframes btn-spin { to { transform: rotate(360deg); } }

/* Disabled: a frosted white surface blended over the emerald aura,
   echoing the same translucent-white-with-overlay treatment used on
   labels, placeholders, eye-toggle and forgot. Reads clearly as
   "inactive" without dropping the design's tonal language. */
.btn-primary:disabled,
.btn-primary[disabled] {
  background: rgba(255, 255, 255, 0.04);
  color: rgba(255, 255, 255, 0.15);
  mix-blend-mode: plus-lighter;
  cursor: not-allowed;
}
.btn-primary:disabled:hover,
.btn-primary:disabled:active,
.btn-primary[disabled]:hover,
.btn-primary[disabled]:active { background: rgba(255, 255, 255, 0.04); }
[data-theme="light"] .btn-primary:disabled:hover,
[data-theme="light"] .btn-primary:disabled:active,
[data-theme="light"] .btn-primary[disabled]:hover,
[data-theme="light"] .btn-primary[disabled]:active { background: var(--neutral-200); }

/* ─── Focus rings (matches sem-015 a11y pattern) ──────── */
button:focus-visible,
.field-affix:focus-visible,
a:focus-visible {
  outline: 1px solid var(--base-white);
  outline-offset: 0;
  box-shadow: var(--focus-ring);
  border-radius: var(--r-sm);
}
body.keyboard-nav .field:has(:focus-visible) {
  border-color: var(--base-white);
  box-shadow: var(--focus-ring);
}

/* ─── Forgot-password link: sits left-aligned under the password
   field as a contextual recovery affordance (separated from the
   primary Login CTA below so the visual hierarchy reads "input →
   recovery / inline help → submit"). */
.password-block,
.email-block {
  display: flex;
  flex-direction: column;
  gap: var(--s2);
}
/* Inline hint below an invalid field. Hidden by default; revealed
   only while the field carries .is-invalid. Animated height/opacity
   so the form doesn't shudder when the message appears/disappears. */
.field-hint {
  font-size: 13px;
  font-weight: 500;
  color: #ff3d3d;
  padding: 0 var(--s3);
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height .15s ease, opacity .15s ease;
}
.email-block:has(.field.is-invalid) .field-hint {
  max-height: 32px;
  opacity: 1;
}
.forgot {
  align-self: flex-start;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #fff;
  opacity: 0.3;
  mix-blend-mode: plus-lighter;
  padding: 0 var(--s1);
  transition: opacity .12s, color .12s;
}
.forgot:hover  { opacity: 1; text-decoration: none; }
.forgot:active { color: var(--teal-450); opacity: 1; text-decoration: none; }
/* Page-level footer: pinned to the bottom of the viewport, outside
   the login card. Uses --text-tertiary (most muted text colour) plus
   ~70% opacity so it sits subtly above the radial-gradient backdrop
   without competing with the card. Responsive bottom offset:
   16px on phones, 24px on tablets, 32px on desktop. */
.page-footer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 16px;
  text-align: center;
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.5px;
  color: #fff;
  opacity: .2;
  mix-blend-mode: plus-lighter;
  pointer-events: none;
}
@media (min-width: 600px)  { .page-footer { bottom: 24px; } }
@media (min-width: 960px)  { .page-footer { bottom: 32px; } }

/* 4x4 dot pinned to the viewport. JS positions it at the geometric
   midpoint between the bottom of the login card and the top of the
   page footer so the spacing stays equal on every viewport size. */
.footer-dot {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: #fff;
  opacity: 0.10;
  mix-blend-mode: plus-lighter;
  pointer-events: none;
}

/* ─── Responsive ──────────────────────────────────────── */
@media (max-width: 420px) {
  .login-card { padding: var(--s5) var(--s4); }
  .wordmark { font-size: 19px; }
}

</style>
</head>
<body>

<a class="skip-link" href="#login-form">Skip to login form</a>

<main class="login-card" role="main">
  <div class="brand-lockup">
    <span class="brand-mark" aria-hidden="true">
      <i class="ph-fill ph-lightning"></i>
    </span>
    <h1 class="wordmark">Sharp Energy Manager</h1>
  </div>

  <form class="login-form" id="login-form" novalidate onsubmit="onSubmit(event)">
    <div class="email-block">
      <label class="field" for="email">
        <span class="field-label">Email</span>
        <div class="field-row">
          <input type="email" id="email" name="email" autocomplete="username" required placeholder="you@company.com" aria-describedby="email-hint">
        </div>
      </label>
      <p class="field-hint" id="email-hint" role="alert">Enter a valid email like name@example.com</p>
    </div>

    <label class="field" for="password">
      <span class="field-label">Password</span>
      <div class="field-row">
        <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">
      </div>
      <button type="button" class="field-affix" id="pw-toggle" aria-label="Show password" aria-pressed="false" onclick="togglePassword()">
        <i class="ph-fill ph-eye" id="pw-toggle-glyph" aria-hidden="true"></i>
      </button>
    </label>

    <div class="form-actions">
      <button type="submit" class="btn-primary" id="login-btn" disabled>Login</button>
    </div>

    <a class="forgot" href="#" onclick="event.preventDefault();alert('Forgot password not wired in this prototype')">Forgot password</a>
  </form>
</main>

<span class="footer-dot" aria-hidden="true"></span>

<footer class="page-footer">
  <span aria-hidden="true">© </span>Pico Systems Sagl 2026
</footer>

<script>
/* Keyboard-vs-mouse tracking — show focus halo only on real Tab. */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') document.body.classList.add('keyboard-nav');
});
document.addEventListener('mousedown', function() {
  document.body.classList.remove('keyboard-nav');
});

function togglePassword() {
  const pw = document.getElementById('password');
  const btn = document.getElementById('pw-toggle');
  const glyph = document.getElementById('pw-toggle-glyph');
  const shown = pw.type === 'text';
  pw.type = shown ? 'password' : 'text';
  btn.setAttribute('aria-pressed', String(!shown));
  btn.setAttribute('aria-label', shown ? 'Show password' : 'Hide password');
  /* Keep ph-fill weight, just swap the glyph between ph-eye / ph-eye-slash. */
  glyph.classList.toggle('ph-eye', shown);
  glyph.classList.toggle('ph-eye-slash', !shown);
  glyph.classList.add('ph-fill');
}

/* Position the 4×4 footer dot at the geometric midpoint between
   the bottom of the login card and the top of the page footer.
   Recompute on resize so the spacing stays equal at any viewport. */
(function positionFooterDot() {
  const card = document.querySelector('.login-card');
  const footer = document.querySelector('.page-footer');
  const dot = document.querySelector('.footer-dot');
  if (!card || !footer || !dot) return;
  function place() {
    const cb = card.getBoundingClientRect().bottom;
    const ft = footer.getBoundingClientRect().top;
    const mid = (cb + ft) / 2 - 16;
    dot.style.top = mid + 'px';
    dot.style.transform = 'translate(-50%, -50%)';
  }
  place();
  window.addEventListener('resize', place);
  window.addEventListener('load', place);
})();

/* Enable the Login button only when email matches a basic format
   (local@domain.tld) and password is non-empty. Invalid email gets
   a soft error border once the user has tabbed/clicked away — we
   don't nag while they're still typing. */
(function wireSubmitGate() {
  const email = document.getElementById('email');
  const pw    = document.getElementById('password');
  const btn   = document.getElementById('login-btn');
  const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const isValidEmail = v => emailRe.test(v.trim());

  const sync = () => {
    btn.disabled = !(isValidEmail(email.value) && pw.value.trim());
  };
  email.addEventListener('input', () => {
    /* Clear error mark as soon as the user edits — gives immediate relief. */
    email.closest('.field').classList.remove('is-invalid');
    sync();
  });
  email.addEventListener('blur', () => {
    const v = email.value.trim();
    email.closest('.field').classList.toggle('is-invalid', v.length > 0 && !isValidEmail(v));
  });
  pw.addEventListener('input', sync);
  sync();
})();

function onSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  if (btn.disabled) return;
  btn.innerHTML = '<i class="ph-bold ph-circle-notch btn-spinner" aria-hidden="true"></i><span>Signing in…</span>';
  btn.disabled = true;
  setTimeout(() => {
    window.location.href = 'sem-015-warehouse-movements.html';
  }, 700);
}
</script>
</body>
</html>
